name: Build FrontEnd Image

on:
  push:
    branches: [ "main", "master", "stg" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Login ke GitHub Container Registry
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Determine image tag based on branch
      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "stg" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # 4️⃣ Build image
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NODE_ENV=${{ secrets.NODE_ENV }} \
            --build-arg NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }} \
            --build-arg NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }} \
            --build-arg NEXT_PUBLIC_STORE_ID=${{ secrets.NEXT_PUBLIC_STORE_ID }} \
            -t ghcr.io/${{ github.repository_owner }}/online-shop-web:${{ steps.tag.outputs.tag }} .

      # 5️⃣ Push image ke GHCR
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/online-shop-web:${{ steps.tag.outputs.tag }}